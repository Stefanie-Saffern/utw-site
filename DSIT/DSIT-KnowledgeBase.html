<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="1.0">
    <title>DSIT Knowledge Base - White Pointer</title>
    
    <style>
        :root {
            --dsit-navy: #00205B;
            --dsit-orange: #F26522;
            --text-dark: #333;
            --bg-light: #f4f7f9;
            --warning-red: #D32F2F;
        }
        
        /* Added smooth scrolling for anchor links */
        html { scroll-behavior: smooth; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: var(--text-dark); margin: 0; display: flex; background: var(--bg-light); }
        
        /* Navigation Sidebar */
        nav { width: 320px; background: var(--dsit-navy); color: white; height: 100vh; position: fixed; overflow-y: auto; padding: 20px; border-right: 4px solid var(--dsit-orange); }
        nav h2 { font-size: 1.1rem; border-bottom: 2px solid var(--dsit-orange); padding-bottom: 10px; margin-bottom: 15px; }
        nav ol { padding-left: 20px; }
        nav ol li { margin: 10px 0; font-weight: bold; }
        nav ol ol { padding-left: 15px; margin-top: 5px; }
        nav ol ol li { font-weight: normal; margin: 5px 0; }
        nav a { color: #bdc3c7; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: white; }
        
        /* Content Area */
        main { margin-left: 320px; padding: 40px; width: 100%; max-width: 1100px; background: white; min-height: 100vh; }
        
        /* Dashboard Blocks */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .db-block { background: var(--dsit-navy); color: white; padding: 20px; border-radius: 8px; text-decoration: none; border-bottom: 5px solid var(--dsit-orange); transition: transform 0.2s; }
        .db-block:hover { transform: translateY(-5px); }
        .db-block h4 { margin: 0 0 10px 0; color: var(--dsit-orange); }
        .db-block p { margin: 0; font-size: 0.85rem; opacity: 0.9; }

        h1 { color: var(--dsit-navy); border-left: 10px solid var(--dsit-orange); padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }
        h2 { color: var(--dsit-navy); margin-top: 50px; border-bottom: 2px solid var(--bg-light); padding-bottom: 10px; }
        h3 { color: var(--dsit-orange); margin-top: 30px; }

        .kb-card { background: var(--bg-light); border-radius: 8px; padding: 25px; margin: 20px 0; border-top: 4px solid var(--dsit-navy); scroll-margin-top: 40px; }
        
        /* Procedure Numbering */
        ol.proc-list { counter-reset: item; list-style-type: none; padding-left: 0; }
        ol.proc-list > li { position: relative; margin-bottom: 15px; padding-left: 45px; }
        ol.proc-list > li::before {
            content: counter(item); counter-increment: item;
            position: absolute; left: 0; top: 0;
            width: 28px; height: 28px; background: var(--dsit-navy); color: white;
            border-radius: 50%; text-align: center; line-height: 28px; font-weight: bold; font-size: 0.8rem;
        }

        .warning { background: #fce4e4; border: 1px solid var(--warning-red); padding: 20px; color: var(--warning-red); border-radius: 5px; margin: 20px 0; }
        
        /* Image / Figure Styling */
        figure { margin: 30px 0; padding: 15px; border: 1px solid #ddd; text-align: center; background: white; }
        figure img { max-width: 100%; height: auto; }
        figcaption { margin-top: 10px; font-weight: bold; color: var(--dsit-navy); font-size: 0.9rem; }
    </style>
</head>
<body>

<nav>
    <h2>UWT Knowledge Base</h2>
    <div style="font-size: 0.85rem; color: #bdc3c7; margin-bottom: 20px;">
        White Pointer Underwater<br>
        <data class="version" value="1.0" itemprop="version">Version 1.0</data>
